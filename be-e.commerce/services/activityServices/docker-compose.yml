version: "3.8"

services:
  activity-service:
    build: .
    container_name: activity-service
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - kafka
      - redis
      - mongodb
    networks:
      - activity-net
    volumes:
      - ./src:/app/src # hot reload khi dev

  mongodb:
    image: mongo:7
    container_name: activity-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - activity-net

  redis:
    image: redis:7-alpine
    container_name: activity-redis
    ports:
      - "6379:6379"
    networks:
      - activity-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: activity-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - activity-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: activity-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - activity-net

volumes:
  mongo-data:

networks:
  activity-net:
    driver: bridge
