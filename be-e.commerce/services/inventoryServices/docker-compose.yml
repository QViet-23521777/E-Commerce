services:
  app:
    build: .
    ports:
      - "3000:3003"
    depends_on:
      - redis
      - mongo
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - MONGODB_URI=mongodb://mongo:27017/ecommerce_inventory

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
